<script src="script.js"></script>
    <script>
        // 使用 window.onload 確保外部程式庫 (Confetti) 已經完全載入
        window.onload = function() {
            const cursor = document.getElementById('custom-cursor');
            
            // 1. 鼠標移動邏輯
            document.addEventListener('mousemove', (e) => {
                if(window.innerWidth > 768) {
                    cursor.classList.remove('hidden-cursor');
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                }
            });

            // 🌸 櫻花參數設定
            const sakuraPetalPath = 'M10,0 C12,5 20,8 18,15 C16,22 12,18 10,16 C8,18 4,22 2,15 C0,8 8,5 10,0 Z';
            const sakuraColors = ['#F5A9CB', '#F08CB5', '#EFA5C8'];

            // 確保 confetti 存在才執行
            if (typeof confetti !== 'undefined') {
                const sakuraShape = confetti.shapeFromPath({ path: sakuraPetalPath });

                // 2. 點擊噴發櫻花
                document.addEventListener('click', (e) => {
                    if(window.innerWidth > 768) {
                        cursor.classList.add('hidden-cursor');
                        setTimeout(() => cursor.classList.remove('hidden-cursor'), 500);
                    }
                    
                    const ripple = document.createElement('div');
                    ripple.className = 'ripple-effect';
                    ripple.style.left = e.clientX + 'px';
                    ripple.style.top = e.clientY + 'px';
                    document.body.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 600);

                    confetti({ 
                        particleCount: 5, 
                        spread: 120, 
                        startVelocity: 10, 
                        gravity: 0.15, 
                        ticks: 400, 
                        shapes: [sakuraShape], 
                        colors: sakuraColors, 
                        scalar: 1.2, 
                        origin: { x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight }, 
                        zIndex: 2147483647 
                    });
                });

                // 3. 背景持續慢速飄落櫻花
                function randomInRange(min, max) { return Math.random() * (max - min) + min; }
                
// 【解決問題 8】：背景櫻花參數加強 (增加大小、飄移度、數量)
function continuousSakura() {
    confetti({
        particleCount: window.innerWidth < 768 ? 2 : 3, // 手機也明顯可見
        startVelocity: 0,
        gravity: randomInRange(0.04, 0.1),
        ticks: 800,
        shapes: [sakuraShape],
        colors: sakuraColors,
        scalar: randomInRange(1.0, 1.8), // 放大花瓣
        origin: { x: Math.random(), y: randomInRange(-0.2, 0) },
        drift: randomInRange(-1, 1),     // 增加風吹飄移感
        disableForReducedMotion: false,
        zIndex: 0 // 放在背景
    });
    setTimeout(continuousSakura, randomInRange(150, 300)); // 頻率調快
}
                
                
                continuousSakura();
            } else {
                console.error("櫻花庫載入失敗，請檢查網路連線或 CDN 網址。");
            }
        };
    </script>
