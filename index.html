<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title data-i18n="app_title">2026 AKB48 粉絲深度性格鑑定</title>

    <meta property="og:title" content="2026 AKB48 粉絲深度性格鑑定">
    <meta property="og:description" content="利用 MBTI 餘弦波演算法，找出與你最契合的 AKB48 靈魂成員！">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://gomensensei.github.io/AKB-MBTI-with-wota/">
    <meta property="og:image" content="https://gomensensei.github.io/AKB-MBTI-with-wota/og-image.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="2026 AKB48 粉絲深度性格鑑定">
    <meta name="twitter:description" content="測測看你與哪位 AKB48 成員最契合！">
    <meta name="twitter:image" content="https://gomensensei.github.io/AKB-MBTI-with-wota/og-image.png">
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>
    <div id="custom-cursor"></div>

    <div id="lang-switcher-container">
        <select id="lang-switcher" class="glass-select">
            <option value="zh-HK">繁體中文</option>
            <option value="zh-CN">简体中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="th">ภาษาไทย</option>
            <option value="id">Bahasa Indonesia</option>
        </select>
    </div>

    <div id="app-container">
        <section id="page-landing" class="glass-panel active">
            <div class="landing-header">
                <span class="subtitle" data-i18n="title_sub">2026 世代交替</span>
                <h1 data-i18n="title_main">AKB48<br><span class="highlight">粉絲深度性格鑑定</span></h1>
            </div>
            <p class="description" data-i18n="desc">
                結合 MBTI 理論與飯圈文化，<br>
                精準測出你的「追星人格」與「靈魂相性成員」。<br>
                尋找名残り桜下，與你最契合的那個她。
            </p>
            <p class="description" style="font-size: 12px; margin-top: -20px; background: rgba(255,20,147,0.05); padding: 10px; border-radius: 8px;" data-i18n="desc_extra"></p>
            <button id="start-btn" class="cyber-btn" data-i18n="start_btn">開始鑑定 (共60題)</button>
        </section>

        <section id="page-quiz" class="hidden">
            <div class="progress-container glass-panel-top">
                <div class="progress-text"><span data-i18n="progress_label">進度：</span><span id="progress-text">0/60</span></div>
                <div class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>
            </div>
            <div class="quiz-viewport">
                <div id="quiz-track" class="quiz-track"></div>
            </div>
            <div class="quiz-nav glass-panel-bottom">
                <button id="prev-btn" class="nav-btn disabled" data-i18n="btn_prev">上一頁</button>
                <button id="next-btn" class="nav-btn cyber-btn" data-i18n="btn_next">下一頁</button>
            </div>
        </section>

        <section id="page-result" class="hidden glass-panel">
            <div id="result-content"></div>
        </section>

        <footer class="site-footer">
            <p data-i18n="footer_text"></p>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
        const cursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            if(window.innerWidth > 768) {
                cursor.classList.remove('hidden-cursor');
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            }
        });
        const sakuraPetalPath = 'M10,0 C12,5 20,8 18,15 C16,22 12,18 10,16 C8,18 4,22 2,15 C0,8 8,5 10,0 Z';
        const sakuraShape = confetti.shapeFromPath({ path: sakuraPetalPath });
        const sakuraColors = ['#F5A9CB', '#F08CB5', '#EFA5C8'];

        document.addEventListener('click', (e) => {
            if(window.innerWidth > 768) {
                cursor.classList.add('hidden-cursor');
                setTimeout(() => cursor.classList.remove('hidden-cursor'), 500);
            }
            const ripple = document.createElement('div');
            ripple.className = 'ripple-effect';
            ripple.style.left = e.clientX + 'px';
            ripple.style.top = e.clientY + 'px';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
            confetti({ particleCount: 4, spread: 120, startVelocity: 8, gravity: 0.15, ticks: 400, shapes: [sakuraShape], colors: sakuraColors, scalar: 1.2, origin: { x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight }, disableForReducedMotion: false, zIndex: 9999 });
        });

// 2. 背景持續慢速飄落櫻花 (名残り桜 氛圍)
        function randomInRange(min, max) { return Math.random() * (max - min) + min; }
        
        function continuousSakura() {
            confetti({
                particleCount: 12,          // 稍微增加數量
                startVelocity: 0,
                gravity: 0.08,
                ticks: 600,
                shapes: [sakuraShape],
                colors: sakuraColors,
                scalar: randomInRange(0.8, 1.4),
                origin: { x: Math.random(), y: -0.1 },
                disableForReducedMotion: false,
                zIndex: 1                   // 【關鍵修復】：改為 1，確保浮在背景之上，但在卡片(z-index: 10)之下
            });
            
            // 縮短間隔時間，讓電腦版寬螢幕也能明顯看到櫻花飄落
            setTimeout(continuousSakura, randomInRange(500, 1500));
        }
        
        continuousSakura();
    </script>
</body>
</html>
