    <script>
        window.onload = function() {
            const cursor = document.getElementById('custom-cursor');
            if(cursor) {
                document.addEventListener('mousemove', (e) => {
                    if(window.innerWidth > 768) {
                        cursor.classList.remove('hidden-cursor');
                        cursor.style.left = e.clientX + 'px';
                        cursor.style.top = e.clientY + 'px';
                    }
                });
            }

            const sakuraPetalPath = 'M10,0 C12,5 20,8 18,15 C16,22 12,18 10,16 C8,18 4,22 2,15 C0,8 8,5 10,0 Z';
            const sakuraColors = ['#F5A9CB', '#F08CB5', '#EFA5C8'];

            if (typeof confetti !== 'undefined') {
                const sakuraShape = confetti.shapeFromPath({ path: sakuraPetalPath });

                document.addEventListener('click', (e) => {
                    const ripple = document.createElement('div');
                    ripple.className = 'ripple-effect';
                    ripple.style.left = e.clientX + 'px';
                    ripple.style.top = e.clientY + 'px';
                    document.body.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 600);

                    confetti({ 
                        particleCount: 5, 
                        spread: 120, 
                        startVelocity: 10, 
                        gravity: 0.15, 
                        ticks: 400, 
                        shapes: [sakuraShape], 
                        colors: sakuraColors, 
                        scalar: 1.2, 
                        origin: { x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight }, 
                        zIndex: 2147483647 
                    });
                });

                function randomInRange(min, max) { return Math.random() * (max - min) + min; }
                
                function continuousSakura() {
                    confetti({
                        particleCount: window.innerWidth < 768 ? 2 : 3,
                        startVelocity: 0,
                        gravity: randomInRange(0.04, 0.1),
                        ticks: 800,
                        shapes: [sakuraShape],
                        colors: sakuraColors,
                        scalar: randomInRange(1.0, 1.8),
                        origin: { x: Math.random(), y: randomInRange(-0.2, 0) },
                        drift: randomInRange(-1, 1),
                        disableForReducedMotion: false,
                        zIndex: 0 
                    });
                    setTimeout(continuousSakura, randomInRange(150, 300));
                }
                
                continuousSakura();
            } else {
                console.error("櫻花庫載入失敗。");
            }
        };
    </script>
